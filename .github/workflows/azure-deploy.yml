# ============================================================
#  .github/workflows/azure-deploy.yml
#
#  Builds and deploys ChampionsLeague.Web to Azure App Service.
#  Triggers on every push to main.
#
#  REQUIRED GITHUB SECRETS:
#    AZURE_WEBAPP_NAME           — your App Service name
#    AZURE_WEBAPP_PUBLISH_PROFILE — XML from Azure Portal → App Service
#                                    → Overview → Get publish profile
# ============================================================

name: Build and deploy to Azure

on:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH:   'ChampionsLeague.Web/ChampionsLeague.Web.csproj'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4      # Node 20+ ✓

      - name: Set up .NET
        uses: actions/setup-dotnet@v4  # Node 20+ ✓
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }}
              --configuration Release
              --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }}
              --configuration Release
              --no-build
              --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3  # Node 20+ ✓
        with:
          app-name:        ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package:         ./publish
